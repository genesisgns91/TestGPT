<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.top{
background:#020617;
padding:10px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

select,input{
padding:8px;
margin:5px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
padding:8px 15px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}
</style>

</head>
<body>

<div class="top">
<div>Workflow</div>
<button onclick="voltar()">Voltar</button>
</div>

<div class="container">

<h3>Nova Tela</h3>

<input id="nomeTela" placeholder="Nome da tela">
<button onclick="criarTela()">Criar Tela</button>

<hr>

<h3>Telas</h3>

<div id="telas"></div>

</div>

<script src="permissoes.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBv-d4GVwf8QOQ_Vr4PrmzJGXB5Y43JzVY",
authDomain: "testegpt-7f69d.firebaseapp.com",
projectId: "testegpt-7f69d",
storageBucket: "testegpt-7f69d.firebasestorage.app",
messagingSenderId: "427161163285",
appId: "1:427161163285:web:2b7f0dc4acfba68667601c"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(async user=>{

if(!user){
window.location.href="index.html"
return
}

await Permissoes.init(auth,db)
Permissoes.aplicar()

carregarTelas()

})

function voltar(){
window.location.href="app.html"
}

async function criarTela(){

Permissoes.somenteAdmin()

let nome = document.getElementById("nomeTela").value

if(!nome) return

await db.collection("telas").add({
nome,
campos:[],
comandos:[],
criado:Date.now()
})

document.getElementById("nomeTela").value=""

carregarTelas()

}

async function carregarTelas(){

let snap = await db.collection("telas").get()

let html=""

snap.forEach(doc=>{

let d = doc.data()

html+=`
<div class="card">

<b>${d.nome}</b>

<br><br>

<button onclick="configurar('${doc.id}')">
Configurar
</button>

<button onclick="excluir('${doc.id}')">
Excluir
</button>

</div>
`

})

document.getElementById("telas").innerHTML=html

}

async function excluir(id){

Permissoes.somenteAdmin()

await db.collection("telas").doc(id).delete()

carregarTelas()

}

function configurar(id){

localStorage.setItem("telaConfig",id)

window.location.href="tela.html"

}

</script>

</body>
</html>
