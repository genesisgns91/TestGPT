<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.top{
background:#020617;
padding:10px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

select,input{
padding:8px;
margin:5px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
padding:8px 15px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #1e293b;
padding:8px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

</style>

</head>
<body>

<div class="top">
<div>Workflow</div>
<button onclick="voltar()">Voltar</button>
</div>

<div class="container">

<h3>Nova Tela</h3>

<input id="nomeTela" placeholder="Nome da tela">
<button onclick="criarTela()">Criar Tela</button>

<hr>

<h3>Telas</h3>

<div id="telas"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

auth.onAuthStateChanged(user=>{
if(!user) window.location.href="index.html"
carregarTelas()
})

function voltar(){
window.location.href="app.html"
}

async function criarTela(){

let nome = document.getElementById("nomeTela").value

await db.collection("telas").add({

nome,
criado:Date.now()

})

carregarTelas()

}

async function carregarTelas(){

let snap = await db.collection("telas").get()

let html=""

snap.forEach(doc=>{

let d = doc.data()

html+=`

<div class="card">

<b>${d.nome}</b>

<br><br>

<button onclick="configurar('${doc.id}','${d.nome}')">
Configurar
</button>

<button onclick="excluir('${doc.id}')">
Excluir
</button>

</div>

`

})

document.getElementById("telas").innerHTML=html

}

async function excluir(id){

await db.collection("telas").doc(id).delete()

carregarTelas()

}

function configurar(id,nome){

localStorage.setItem("telaConfig",id)

window.location.href="tela.html"

}

</script>

</body>
</html>
