<html lang="pt-BR">

<body>

<div class="top">

<label>Tipo</label>
<select id="tipo">
<option value="bar">Barra</option>
<option value="line">Linha</option>
<option value="pie">Pizza</option>
</select>

<label>Campo</label>
<select id="campo"></select>

<button onclick="criar()">Criar</button>

<div id="graficos"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let telaId = localStorage.getItem("telaConfig")
let campos = []

init()

async function init(){

let doc = await db.collection("telas").doc(telaId).get()

campos = doc.data().campos || []

let select = document.getElementById("campo")

campos.forEach(c=>{
select.innerHTML += `<option value="${c.id}">${c.nome}</option>`
})

carregar()

}

function voltar(){
window.location.href="tela.html"
}

async function criar(){

let tipo = document.getElementById("tipo").value
let campo = document.getElementById("campo").value

await db.collection("graficos").add({
tela:telaId,
tipo,
campo
})

carregar()

}
