<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FlowGNS - Sistema de Gestão</title>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { 
    getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { 
    getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, 
    updateDoc, deleteDoc, query, where, orderBy, runTransaction, addDoc 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyADZphyLztYYeMV130uyq_3CYthr6QzBo0",
    authDomain: "coringa-c0bce.firebaseapp.com",
    projectId: "coringa-c0bce",
    storageBucket: "coringa-c0bce.firebasestorage.app",
    messagingSenderId: "346363639454",
    appId: "1:346363639454:web:38b288fe0d7abf66daad8f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Expondo para o escopo global de forma organizada
  window.fb = { auth, db };
  window.fbAuth = { onAuthStateChanged, signOut, signInWithEmailAndPassword };
  window.fbDb = { doc, setDoc, getDoc, onSnapshot, collection, getDocs, updateDoc, deleteDoc, query, where, orderBy, runTransaction, addDoc };

  // Inicializa EmailJS
  emailjs.init("EBoUWW7xHzfnthAsO");

  window.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
/* ── ESTILOS ───────────────────────────────────────────── */
:root {
  --bg: #f4f4f2; --white: #ffffff; --accent: #2d5be3; --text: #1a1a18;
  --border: rgba(0,0,0,0.1); --success: #1d9e75; --danger: #d32f2f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
.topbar { background: var(--white); padding: 12px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); sticky: top; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
.btn-primary { background: var(--accent); color: white; border: none; }
.content { padding: 20px; max-width: 1200px; margin: 0 auto; }
.card { background: var(--white); padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px var(--border); margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.open { display: flex; }
.modal { background: white; padding: 25px; border-radius: 12px; width: 500px; max-width: 95%; }
.hidden { display: none; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 1000; }
</style>
</head>
<body>

<div id="authScreen" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
  <div class="card" style="width: 350px;">
    <h2>FlowGNS Login</h2>
    <input type="email" id="loginEmail" placeholder="E-mail" style="width:100%; padding:10px; margin: 10px 0;">
    <input type="password" id="loginPwd" placeholder="Senha" style="width:100%; padding:10px; margin-bottom: 15px;">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="mainApp" style="display:none">
  <div class="topbar">
    <h3 style="margin-right: 20px;">FlowGNS</h3>
    <button class="btn" onclick="showPanel('home')">Dashboard</button>
    <button class="btn" onclick="showPanel('groups')">Grupos E-mail</button>
    <div style="flex:1"></div>
    <button class="btn" onclick="doLogout()">Sair</button>
  </div>

  <div class="content">
    <div id="panel-home" class="panel active">
        <div id="homeCards" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
    </div>

    <div id="panel-groups" class="panel hidden">
        <div class="card">
            <h4>Cadastro de Grupos (Editável por todos)</h4>
            <input type="text" id="grpId" placeholder="Nome Grupo (Ex: 101)" style="padding:8px; width:120px">
            <input type="text" id="grpEmails" placeholder="emails separados por vírgula" style="padding:8px; width:300px">
            <button class="btn btn-primary" onclick="saveEmailGroup()">Cadastrar</button>
        </div>
        <div id="groupsList"></div>
    </div>

    <div id="panel-table" class="panel hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2 id="tableTitle">Tabela</h2>
            <button class="btn btn-primary" onclick="openModal('recordModal')">+ Novo Registro</button>
        </div>
        <div id="tableContainer"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="recordModal">
    <div class="modal">
        <h3>Novo Lançamento</h3>
        <div id="formFields" style="margin-top:15px"></div>
        <div style="text-align:right; margin-top:20px">
            <button class="btn" onclick="closeModal('recordModal')">Cancelar</button>
            <button class="btn btn-primary" onclick="handleSave()">Salvar</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
let state = { user: null, screens: [], currentScreen: null, groups: {} };

// --- AUTH ---
async function doLogin() {
    const e = document.getElementById('loginEmail').value;
    const p = document.getElementById('loginPwd').value;
    try {
        await fbAuth.signInWithEmailAndPassword(fb.auth, e, p);
    } catch(err) { alert("Erro ao entrar: " + err.message); }
}

async function doLogout() { await fbAuth.signOut(fb.auth); }

window.addEventListener('firebaseReady', () => {
    fbAuth.onAuthStateChanged(fb.auth, user => {
        if(user) {
            state.user = user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadData();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });
});

// --- DATA LOADING ---
async function loadData() {
    const snap = await fbDb.getDocs(fbDb.collection(fb.db, "screens"));
    state.screens = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderHome();
    loadGroups();
}

function renderHome() {
    const container = document.getElementById('homeCards');
    container.innerHTML = state.screens.map(s => `
        <div class="card" onclick="openScreen('${s.id}')" style="cursor:pointer">
            <h3>${s.name}</h3>
            <p>${s.type}</p>
        </div>
    `).join('');
}

// --- SEQUENTIAL SERIAL GENERATOR ---
async function generateSerial() {
    const date = new Date();
    const prefix = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2, '0')}`;
    const counterRef = fbDb.doc(fb.db, "system", "counters");
    
    let serial = "";
    await fbDb.runTransaction(fb.db, async (transaction) => {
        const snap = await transaction.get(counterRef);
        let count = 1;
        if(snap.exists() && snap.data()[prefix]) {
            count = snap.data()[prefix] + 1;
        }
        transaction.set(counterRef, { [prefix]: count }, { merge: true });
        serial = `${prefix}-${String(count).padStart(4, '0')}`;
    });
    return serial;
}

// --- SAVE & ACTIONS ---
async function handleSave() {
    const screen = state.currentScreen;
    const serial = await generateSerial();
    const data = {
        "Série#": serial,
        screenId: screen.id,
        user: state.user.email,
        timestamp: new Date().toISOString()
    };

    document.querySelectorAll('.f-input').forEach(i => {
        data[i.name] = i.value;
    });

    // 1. Salva na Tabela de Ação
    await fbDb.addDoc(fbDb.collection(fb.db, `records_${screen.id}`), data);

    // 2. Salva no Histórico (Ponto 5 - nunca deletado)
    await fbDb.addDoc(fbDb.collection(fb.db, "historico_geral"), { ...data, logType: 'ENTRADA' });

    // 3. Envio de EmailJS (Ponto 1 e 2)
    sendEmailNotification(screen, data);

    showToast("Salvo com sucesso! Série: " + serial);
    closeModal('recordModal');
    openScreen(screen.id);
}

async function runBatchAction(serial, targetStatus) {
    if(!confirm("Deseja movimentar todas as linhas desta série?")) return;

    const screen = state.currentScreen;
    const q = fbDb.query(fbDb.collection(fb.db, `records_${screen.id}`), fbDb.where("Série#", "==", serial));
    const snap = await fbDb.getDocs(q);

    for (let d of snap.docs) {
        const docData = d.data();
        // Move para histórico de movimentação
        await fbDb.addDoc(fbDb.collection(fb.db, "historico_geral"), { ...docData, logType: 'MOVIMENTACAO', status: targetStatus });
        // Deleta da tabela ativa
        await fbDb.deleteDoc(fbDb.doc(fb.db, `records_${screen.id}`, d.id));
    }

    showToast("Série movimentada com sucesso!");
    openScreen(screen.id);
}

// --- EMAILJS LOGIC ---
async function sendEmailNotification(screen, data) {
    const groupId = data.grupo; // Campo 'grupo' no form
    let emails = "";

    if(groupId && state.groups[groupId]) {
        emails = state.groups[groupId];
    }

    if(emails) {
        emailjs.send("service_neeyil2", "template_38hvw8h", {
            to_email: emails,
            serial: data["Série#"],
            message: `Novo registro realizado por ${data.user}.`
        }).then(() => console.log("Email enviado")).catch(e => console.error(e));
    }
}

// --- TABLE & BALANCE RENDER ---
async function openScreen(id) {
    const screen = state.screens.find(s => s.id === id);
    state.currentScreen = screen;
    showPanel('table');
    document.getElementById('tableTitle').innerText = screen.name;

    const snap = await fbDb.getDocs(fbDb.collection(fb.db, `records_${id}`));
    const records = snap.docs.map(d => ({id: d.id, ...d.data()}));

    // Cálculo de Saldo Acumulado (Ponto 5)
    const saldos = {};
    records.forEach(r => {
        const item = r.item || r.codigo || "Indefinido";
        saldos[item] = (saldos[item] || 0) + parseFloat(r.quantidade || 0);
    });

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Série#</th>
                    <th>Item</th>
                    <th>Qtd Linha</th>
                    <th>Saldo Total Item</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                ${records.map(r => {
                    const itemKey = r.item || r.codigo || "Indefinido";
                    return `
                    <tr>
                        <td><b>${r["Série#"]}</b></td>
                        <td>${itemKey}</td>
                        <td>${r.quantidade}</td>
                        <td style="color:blue; font-weight:bold">${saldos[itemKey]}</td>
                        <td>
                            <button class="btn" onclick="runBatchAction('${r["Série#"]}', 'MOVIMENTADO')">Mover Tudo</button>
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
    `;
    document.getElementById('tableContainer').innerHTML = html;
}

// --- CONDICIONAIS (Ponto 4) ---
function checkConditions() {
    const qtd = parseFloat(document.querySelector('[name="quantidade"]').value) || 0;
    const condField = document.getElementById('campo-condicional');
    // Exemplo: Se quantidade > 100, mostra campo de observação
    if(qtd > 100) {
        condField.classList.remove('hidden');
    } else {
        condField.classList.add('hidden');
    }
}

function renderFields() {
    const container = document.getElementById('formFields');
    container.innerHTML = `
        <label>Item / Código</label>
        <input type="text" name="item" class="f-input" style="width:100%; padding:8px; margin-bottom:10px">
        
        <label>Quantidade</label>
        <input type="number" name="quantidade" class="f-input" oninput="checkConditions()" style="width:100%; padding:8px; margin-bottom:10px">
        
        <div id="campo-condicional" class="hidden">
            <label style="color:red">Observação Urgente (Qtd Alta!)</label>
            <input type="text" name="obs" class="f-input" style="width:100%; padding:8px; margin-bottom:10px">
        </div>

        <label>Grupo de E-mail</label>
        <input type="text" name="grupo" class="f-input" placeholder="Ex: 101" style="width:100%; padding:8px; margin-bottom:10px">
    `;
}

// --- GROUPS ---
async function saveEmailGroup() {
    const id = document.getElementById('grpId').value;
    const list = document.getElementById('grpEmails').value;
    await fbDb.setDoc(fbDb.doc(fb.db, "emailGroups", id), { list });
    loadGroups();
}

async function loadGroups() {
    const snap = await fbDb.getDocs(fbDb.collection(fb.db, "emailGroups"));
    const groups = {};
    let html = "<ul>";
    snap.forEach(d => {
        groups[d.id] = d.data().list;
        html += `<li><b>${d.id}:</b> ${d.data().list}</li>`;
    });
    state.groups = groups;
    document.getElementById('groupsList').innerHTML = html + "</ul>";
}

// --- UI HELPERS ---
function showPanel(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('panel-' + id).classList.remove('hidden');
}
function openModal(id) { 
    document.getElementById(id).classList.add('open'); 
    if(id==='recordModal') renderFields();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.background = 'var(--success)'; t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3000);
}
</script>
</body>
</html>
