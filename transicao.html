<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transição</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.top{
padding:10px;
background:#020617;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

button{
padding:8px 15px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}
</style>

</head>
<body>

<div class="top">
<div>Transição</div>
<button onclick="voltar()">Cancelar</button>
</div>

<div class="container">

<h3>Campos da Transição</h3>

<div id="form"></div>

<button onclick="confirmar()">Confirmar</button>

</div>

<script src="permissoes.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBv-d4GVwf8QOQ_Vr4PrmzJGXB5Y43JzVY",
authDomain: "testegpt-7f69d.firebaseapp.com",
projectId: "testegpt-7f69d",
storageBucket: "testegpt-7f69d.firebasestorage.app",
messagingSenderId: "427161163285",
appId: "1:427161163285:web:2b7f0dc4acfba68667601c"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let registroId = localStorage.getItem("transicao_registro")
let destino = localStorage.getItem("transicao_destino")
let campos = []

auth.onAuthStateChanged(async user=>{

if(!user){
window.location.href="index.html"
return
}

await Permissoes.init(auth,db)
Permissoes.aplicar()

init()

})

async function init(){

let doc = await db.collection("telas").doc(destino).get()

if(!doc.exists){
campos=[]
}else{
campos = doc.data().campos || []
}

render()

}

function render(){

let html=""

campos.forEach(c=>{

html+=`
<label>${c.nome}</label>
<input id="f_${c.id}" type="${c.tipo}">
`

})

document.getElementById("form").innerHTML=html

}

async function confirmar(){

let doc = await db.collection("registros").doc(registroId).get()

if(!doc.exists) return

let dados = doc.data()

campos.forEach(c=>{
dados[c.id] = document.getElementById("f_"+c.id).value
})

dados.tela = destino

await db.collection("registros").doc(registroId).set(dados)

window.location.href="tela.html"

}

function voltar(){
window.location.href="tela.html"
}

</script>

</body>
</html>
