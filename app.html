<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Dinâmico</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.topbar{
background:#020617;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
padding:8px 15px;
background:#1e293b;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#3b82f6;
}

.container{
padding:20px;
}

input,select{
padding:8px;
margin:5px 0;
width:100%;
border-radius:6px;
border:none;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #1e293b;
padding:8px;
text-align:left;
}

.admin{
background:#ef4444;
}

.hidden{
display:none;
}

</style>
</head>
<body>

<div class="topbar">
<div>App Dinâmico</div>

<div>
<button onclick="logout()">Sair</button>
</div>
</div>


<div class="tabs">
<div class="tab active" onclick="abrirTab('registro')">Registro</div>
<div class="tab" onclick="abrirTab('tabela')">Tabela</div>
<div class="tab hidden" id="tabAdmin" onclick="abrirTab('admin')">Admin</div>
</div>


<div class="container">

<div id="registro"></div>

<div id="tabela" class="hidden">
<button onclick="exportCSV()">Exportar CSV</button>
<div id="tableArea"></div>
</div>

<div id="admin" class="hidden">

<h3>Campos do Formulário</h3>

<input id="campoNome" placeholder="Nome do campo">

<select id="campoTipo">
<option value="text">Texto</option>
<option value="number">Número</option>
<option value="date">Data</option>
</select>

<label>
<input type="checkbox" id="campoObrigatorio">
Obrigatório
</label>

<button onclick="addCampo()">Adicionar Campo</button>

<div id="listaCampos"></div>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userRole = "user"
let campos = []


auth.onAuthStateChanged(async user=>{

if(!user){
window.location.href="index.html"
return
}

let doc = await db.collection("usuarios").doc(user.uid).get()

if(doc.exists){
userRole = doc.data().role || "user"
}

if(userRole === "admin"){
document.getElementById("tabAdmin").classList.remove("hidden")
}

carregarCampos()
carregarTabela()

})


function logout(){
auth.signOut()
}


function abrirTab(nome){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
event.target.classList.add("active")

document.getElementById("registro").classList.add("hidden")
document.getElementById("tabela").classList.add("hidden")
document.getElementById("admin").classList.add("hidden")

document.getElementById(nome).classList.remove("hidden")

}



async function carregarCampos(){

let snap = await db.collection("config").doc("campos").get()

campos = snap.exists ? snap.data().lista : []

renderForm()
renderCamposAdmin()

}



function renderForm(){

let html = "<h3>Registro</h3>"

campos.forEach(c=>{

html+=`
<label>${c.nome}</label>
<input id="campo_${c.id}" type="${c.tipo}">
`

})

html+=`<button onclick="salvar()">Salvar</button>`

document.getElementById("registro").innerHTML = html

}



async function salvar(){

let dados = {}

campos.forEach(c=>{
dados[c.id] = document.getElementById("campo_"+c.id).value
})

dados.data = Date.now()

await db.collection("registros").add(dados)

carregarTabela()

alert("Salvo")

}



async function carregarTabela(){

let snap = await db.collection("registros").get()

let html = "<table><tr>"

campos.forEach(c=>{
html+=`<th>${c.nome}</th>`
})

if(userRole==="admin"){
html+="<th>Ações</th>"
}

html+="</tr>"

snap.forEach(doc=>{

let d = doc.data()

html+="<tr>"

campos.forEach(c=>{
html+=`<td>${d[c.id]||""}</td>`
})

if(userRole==="admin"){
html+=`<td>
<button onclick="excluir('${doc.id}')">Excluir</button>
</td>`
}

html+="</tr>"

})

html+="</table>"

document.getElementById("tableArea").innerHTML = html

}



async function excluir(id){

await db.collection("registros").doc(id).delete()

carregarTabela()

}



async function addCampo(){

let nome = document.getElementById("campoNome").value
let tipo = document.getElementById("campoTipo").value
let obrigatorio = document.getElementById("campoObrigatorio").checked

let campo = {
id: Date.now().toString(),
nome,
tipo,
obrigatorio
}

campos.push(campo)

await db.collection("config").doc("campos").set({
lista: campos
})

carregarCampos()

}



function renderCamposAdmin(){

if(userRole!=="admin") return

let html=""

campos.forEach(c=>{
html+=`
<div>
${c.nome}
<button onclick="removerCampo('${c.id}')">x</button>
</div>
`
})

document.getElementById("listaCampos").innerHTML=html

}



async function removerCampo(id){

campos = campos.filter(c=>c.id!==id)

await db.collection("config").doc("campos").set({
lista: campos
})

carregarCampos()

}



async function exportCSV(){

let snap = await db.collection("registros").get()

let csv = ""

campos.forEach(c=>{
csv+=c.nome+";"
})

csv+="\n"

snap.forEach(doc=>{

let d = doc.data()

campos.forEach(c=>{
csv+=(d[c.id]||"")+";"
})

csv+="\n"

})

let blob = new Blob([csv])
let a = document.createElement("a")

a.href = URL.createObjectURL(blob)
a.download="dados.csv"
a.click()

}

</script>

</body>
</html>
